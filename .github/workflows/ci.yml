name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Resend API
      RESEND_API_KEY: dummy-key
      NEXT_PUBLIC_FIREBASE_API_KEY: dummy-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dummy-key
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: dummy-key
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: dummy-key
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: dummy-key
      NEXT_PUBLIC_FIREBASE_APP_ID: dummy-key
      CONTACT_EMAIL_TO: test@example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.npm
            ./node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
